:root {

  --warm: #b6876a;
  --green: #3d6b5a;
  --red: #a34b3b;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; background: #e8e4dc;
  font-family: 'Noto Sans JP', -apple-system, system-ui, sans-serif;
  color: var(--ink); -webkit-font-smoothing: antialiased; letter-spacing: 0.01em;
}
.mono { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', monospace; letter-spacing: 0; }
.serif { font-family: 'Noto Serif JP', 'Noto Serif', serif; }
.stage {
  width: 100%; height: 100vh;
}
.stage-bg { display: none; }
.screen {
  width: 100%; height: 100vh; background: var(--bg);
  overflow: hidden; position: relative; display: flex; flex-direction: column;
}
.btn {
  border: none; background: var(--ink); color: white;
  padding: 14px 20px; border-radius: 14px; font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: inherit; letter-spacing: 0.02em;
}
.btn:active { transform: scale(0.98); }
.btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
.btn-pill { border-radius: 999px; padding: 10px 16px; font-size: 13px; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 999px; background: var(--card);
  border: 1px solid var(--line); font-size: 12px; color: var(--ink-2); white-space: nowrap;
}
.chip.active { background: var(--ink); color: white; border-color: var(--ink); }
.card { background: var(--card); border-radius: 20px; border: 1px solid var(--line); }
.screen *::-webkit-scrollbar { width: 0; display: none; }
.placeholder-img {
  background: repeating-linear-gradient(135deg, #efede8 0 8px, #e8e4dc 8px 16px);
  position: relative;
}
.placeholder-img::after {
  content: attr(data-label); position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: rgba(0,0,0,0.38); letter-spacing: 0.05em;
}
.fade-in { animation: fadeIn 0.35s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.slide-in-right { animation: slideRight 0.3s cubic-bezier(0.22, 0.8, 0.36, 1); }
@keyframes slideRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
.shimmer {
  background: linear-gradient(90deg, #f0ede7 25%, #f7f5f0 50%, #f0ede7 75%);
  background-size: 200% 100%; animation: shimmer 1.8s infinite;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.time-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--ink); flex-shrink: 0; }
.route-path { stroke-dasharray: 6 4; animation: dash 30s linear infinite; }
@keyframes dash { to { stroke-dashoffset: -200; } }
</style>

        <path d="M 180 180 L 230 160 L 260 180 L 250 210 L 210 220 Z" fill="url(#hatch)" opacity="0.6"/>
        <path d="M 230 110 L 270 95 L 300 115 L 290 145 L 250 150 Z" fill="url(#hatch)" opacity="0.5"/>

// ─── Timeline ────────────────────────────────────────────
function minToReadable(m) {
  if (m < 60) return `${m}分`;
  const h = Math.floor(m / 60); const rm = m % 60;
  return rm ? `${h}h ${rm}m` : `${h}h`;
}

function ModeIcon({ mode, size = 12 }) {
  const c = '#7a7a7a';
  if (mode === '徒歩') return <svg width={size} height={size} viewBox="0 0 16 16"><circle cx="9" cy="2.5" r="1.5" fill={c}/><path d="M7 6 L5 10 L3 12 M8 6 L10 9 L12 12 M7 6 L8 10 L7 14" stroke={c} strokeWidth="1.2" fill="none" strokeLinecap="round"/></svg>;
  if (mode === 'バス') return <svg width={size} height={size} viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="9" rx="1.5" fill="none" stroke={c} strokeWidth="1.2"/><rect x="3.5" y="4.5" width="9" height="3" fill={c} opacity="0.4"/><circle cx="5" cy="12.5" r="1" fill={c}/><circle cx="11" cy="12.5" r="1" fill={c}/></svg>;
  if (mode === '車' || mode === 'タクシー') return <svg width={size} height={size} viewBox="0 0 16 16"><path d="M2 10 L3 6 L13 6 L14 10 L14 12 L2 12 Z" fill="none" stroke={c} strokeWidth="1.2"/><circle cx="4.5" cy="12" r="1" fill={c}/><circle cx="11.5" cy="12" r="1" fill={c}/></svg>;
  return <span style={{ fontSize: 10, color: c }}>•</span>;
}

function TimelineDay({ day, onSpotTap, activeSpot }) {
  return (
    <div>
      {day.items.map((it, i) => {
        const isMove = it.type === 'move';
        const isActive = activeSpot === it.spot;
        return (
          <div key={i} onClick={() => it.spot && onSpotTap?.(it.spot)} style={{ display: 'flex', gap: 12, padding: '10px 0', cursor: it.spot ? 'pointer' : 'default', position: 'relative' }}>
            <div className="mono" style={{ width: 48, fontSize: 12, color: '#7a7a7a', paddingTop: 3, flexShrink: 0 }}>{it.t}</div>
            <div style={{ position: 'relative', width: 14, flexShrink: 0 }}>
              <div style={{ position: 'absolute', left: 6, top: 0, bottom: -20, width: 1, background: '#e8e4dc' }}/>
              {isMove ? (
                <div style={{ position: 'absolute', left: 2, top: 8, width: 8, height: 8, borderRadius: '50%', background: 'white', border: '1.5px solid #c8c4bc' }}/>
              ) : (
                <div style={{ position: 'absolute', left: 1, top: 6, width: 11, height: 11, borderRadius: '50%', background: isActive ? '#3B5BA5' : '#141414', boxShadow: isActive ? '0 0 0 3px rgba(59,91,165,0.2)' : 'none', transition: 'all 0.2s' }}/>
              )}
            </div>
            <div style={{ flex: 1, paddingBottom: 6, borderRadius: 10, background: isActive ? '#f1f3f8' : 'transparent', padding: isActive ? '6px 10px' : '0', margin: isActive ? '-6px -10px 0' : '0', transition: 'all 0.2s' }}>
              <div style={{ fontSize: 14, fontWeight: isMove ? 400 : 600, color: isMove ? '#7a7a7a' : '#141414', display: 'flex', alignItems: 'center', gap: 6 }}>
                {isMove && <ModeIcon mode={it.mode} size={12}/>}
                <span>{it.title}</span>
                {isMove && it.dur > 0 && <span className="mono" style={{ fontSize: 11, color: '#a5a5a5' }}>· {minToReadable(it.dur)}</span>}
              </div>
              {it.note && <div style={{ fontSize: 12, color: '#7a7a7a', marginTop: 4, lineHeight: 1.5 }}>{it.note}</div>}

  );
}

// ─── Loading Screen ───────────────────────────────────────
function LoadingScreen({ onDone }) {
  const [step, setStep] = useState(0);
  const messages = ['スポット情報を収集中...', '行き先に合う旅のスタイルを検討中...', '移動経路と滞在時間を最適化中...', '3つの切り口でプランを作成中...', '宿泊・食事の候補を精選中...', '最終チェック...'];
  useEffect(() => {
    const t = setInterval(() => {
      setStep(s => {
        if (s >= messages.length - 1) { clearInterval(t); setTimeout(onDone, 600); return s; }
        return s + 1;
      });
    }, 550);
    return () => clearInterval(t);
  }, []);
  return (

// ─── AI Chat ─────────────────────────────────────────────
function AIChat({ onClose, plan, onApply }) {
  const [messages, setMessages] = useState([{ role: 'ai', text: `${plan ? plan.title : 'プラン'}について、どう調整しますか？気軽にお伝えください。` }]);
  const [input, setInput] = useState('');
  const [thinking, setThinking] = useState(false);
  const bottomRef = useRef();

  useEffect(() => { bottomRef.current?.scrollTo({ top: 99999, behavior: 'smooth' }); }, [messages, thinking]);

  const GEMINI_API_KEY = 'AIzaSyCd6hixMPTagnB3_INrpQ0dsXqb6xJqkeE';
  const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;

  const callGemini = async (userText) => {
    const systemPrompt = `あなたは旅行プランナーAIアシスタントです。
現在のプラン「${plan.title}」（${plan.tagline}）について、ユーザーの要望に日本語で簡潔に答えてください。
プランの調整内容を具体的に説明し、変更点のタイトルも提案してください。

以下のJSON形式のみで返答してください（説明文や\`\`\`は不要）:
{"message":"回答テキスト（2〜4文）","change":"変更タイトル（10文字以内）"}`;

    const res = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: `${systemPrompt}\n\nユーザーの要望: ${userText}` }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 300 },
      }),
    });
    if (!res.ok) throw new Error(`API error: ${res.status}`);
    const data = await res.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    try {
      const clean = raw.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
      return JSON.parse(clean);
    } catch {
      return { message: raw, change: 'AI調整' };
    }
  };

  const send = async (text) => {
    if (!text.trim()) return;
    setMessages(m => [...m, { role: 'user', text }]);
    setInput('');
    setThinking(true);
    try {
      const reply = await callGemini(text);
      setMessages(m => [...m, { role: 'ai', text: reply.message, change: reply.change || null }]);
    } catch (e) {
      setMessages(m => [...m, { role: 'ai', text: `エラーが発生しました: ${e.message}` }]);
    } finally {
      setThinking(false);
    }
  };

  const suggestions = ['雨の日版に変えて', '早朝メインで', 'もう少し温泉を入れて', '予算を抑えたい'];

  return (
    <div style={{ position: 'absolute', inset: 0, background: 'rgba(20,20,20,0.3)', zIndex: 100, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', animation: 'fadeIn 0.2s' }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: 'white', borderRadius: '24px 24px 0 0', height: '82%', display: 'flex', flexDirection: 'column', animation: 'slideUp 0.3s cubic-bezier(0.22,0.8,0.36,1)', overflow: 'hidden' }}>
        <div style={{ padding: '10px 0 0', display: 'flex', justifyContent: 'center' }}>
          <div style={{ width: 40, height: 4, borderRadius: 2, background: '#e8e4dc' }}/>
        </div>
        <div style={{ padding: '10px 20px 12px', borderBottom: '1px solid #efede8' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ width: 36, height: 36, borderRadius: '50%', background: 'radial-gradient(circle at 30% 30%, #3B5BA5, #141414)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 2l2 6 6 2-6 2-2 6-2-6-6-2 6-2 2-6z" fill="white"/></svg>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 600, fontSize: 14 }}>AIアシスタント</div>
              <div className="mono" style={{ fontSize: 10, color: '#7a7a7a', marginTop: 1 }}>GEMINI · プランを会話で調整</div>
            </div>
            <button onClick={onClose} style={{ border: 'none', background: '#f5f2ec', width: 28, height: 28, borderRadius: '50%', cursor: 'pointer', fontSize: 14, color: '#7a7a7a' }}>✕</button>
          </div>
        </div>
        <div ref={bottomRef} style={{ flex: 1, overflowY: 'auto', padding: '16px 20px' }}>
          {messages.map((m, i) => (
            <div key={i} style={{ display: 'flex', justifyContent: m.role === 'user' ? 'flex-end' : 'flex-start', marginBottom: 10 }}>
              <div style={{ maxWidth: '82%', padding: '10px 14px', borderRadius: 14, background: m.role === 'user' ? '#141414' : '#f5f2ec', color: m.role === 'user' ? 'white' : '#141414', fontSize: 13, lineHeight: 1.55 }}>
                {m.text}
                {m.change && (
                  <div style={{ marginTop: 8, padding: '8px 10px', borderRadius: 8, background: 'white', border: '1px solid #e8e4dc', display: 'flex', alignItems: 'center', gap: 8 }}>
                    <div style={{ width: 8, height: 8, borderRadius: '50%', background: '#3B5BA5', flexShrink: 0 }}/>
                    <div style={{ flex: 1, fontSize: 12, fontWeight: 600, color: '#141414' }}>{m.change}</div>
                    <button onClick={() => onApply?.(m.change)} style={{ border: 'none', background: '#141414', color: 'white', padding: '5px 10px', borderRadius: 6, fontSize: 11, cursor: 'pointer', fontFamily: 'inherit', fontWeight: 600 }}>適用</button>
                  </div>
                )}
              </div>
            </div>
          ))}
          {thinking && (
            <div style={{ display: 'flex', gap: 4, padding: '10px 14px' }}>
              {[0, 0.2, 0.4].map((delay, i) => <div key={i} style={{ width: 6, height: 6, borderRadius: '50%', background: '#a5a5a5', animation: `bounce 1s ${delay}s infinite` }}/>)}
            </div>
          )}
        </div>
        {messages.length < 2 && (
          <div style={{ padding: '0 20px 10px', display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {suggestions.map(s => <button key={s} onClick={() => send(s)} className="chip" style={{ cursor: 'pointer', fontFamily: 'inherit' }}>{s}</button>)}
          </div>
        )}
        <div style={{ padding: '12px 16px 24px', borderTop: '1px solid #efede8', display: 'flex', gap: 8 }}>
          <div style={{ flex: 1, background: '#f5f2ec', borderRadius: 20, padding: '4px 4px 4px 14px', display: 'flex', alignItems: 'center' }}>
            <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && send(input)} placeholder="プランに要望を..." style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', padding: '8px 4px', fontSize: 13, fontFamily: 'inherit' }}/>

            </button>
          </div>
        </div>
      </div>
      <style>{`@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } } @keyframes bounce { 0%, 80%, 100% { opacity: 0.3; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-4px); } }`}</style>
    </div>
  );
}

              <div style={{ width: 22, height: 22, borderRadius: '50%', border: on ? 'none' : '1.5px solid #d5d1c8', background: on ? '#141414' : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                {on && <svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3 5-6" stroke="white" strokeWidth="1.8" fill="none"/></svg>}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, padding: '14px 16px 38px', background: 'white', borderTop: '1px solid #efede8' }}>
        <button disabled={selected.length === 0} onClick={() => setSent(true)} style={{ width: '100%', padding: '14px', borderRadius: 12, border: 'none', background: selected.length ? '#141414' : '#d5d1c8', color: 'white', fontSize: 14, fontWeight: 600, cursor: selected.length ? 'pointer' : 'not-allowed', fontFamily: 'inherit' }}>
          {selected.length ? `${selected.length}件に送信` : '相手を選択'}
        </button>
      </div>
    </div>
  );
}

// ─── Plan Generation ─────────────────────────────────────
const GEMINI_KEY = 'AIzaSyCd6hixMPTagnB3_INrpQ0dsXqb6xJqkeE';

async function generatePlansWithGemini(tripState) {
  const { destination, nights, people, spots, hotels, hotelMode, startDate } = tripState;
  const days = nights + 1;

  const getDayDate = (i) => {
    if (!startDate) return '';
    const d = new Date(startDate);
    d.setDate(d.getDate() + i);
    const wdays = ['日','月','火','水','木','金','土'];
    return `${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${wdays[d.getDay()]})`;
  };

  const dayDates = Array.from({length: days}, (_, i) => getDayDate(i));
  const spotsText = spots.length
    ? spots.map(s => s.day ? `${s.name}（Day${s.day}希望）` : s.name).join('、')
    : 'AIにおまかせ';
  const hotelText = hotelMode === 'booked'
    ? Array.from({length: nights}, (_, i) => `${i+1}泊目: ${(hotels||[])[i]||'未定'}`).join('、')
    : 'AIが宿泊先も提案';

  const dateHint = dayDates[0] ? `出発${dayDates[0]}、` : '';
  const dayDateHint = dayDates.length
    ? dayDates.map((d,i) => `Day${i+1}="${d||`Day${i+1}`}"`).join('、')
    : '';

  const prompt = `旅行プラン3案をJSONのみで出力。説明文・コードブロック不要。

条件: 行き先=${destination}、${dateHint}${nights}泊${days}日、${people}人
希望スポット: ${spotsText}
宿泊: ${hotelText}

形式(JSON配列3要素):
[{"id":"p1","title":"タイトル10字以内","tagline":"25字以内","accent":"#3B5BA5","meta":{"walk":"X.Xkm","cost":"¥XX,XXX","spots":数字,"rating":4.5},"highlights":["A","B","C"],"days":[{"label":"Day 1","date":"${dayDates[0]||''}","sub":"テーマ","items":[{"t":"09:00","type":"stay","title":"名称","dur":90,"note":"メモ"},{"t":"10:30","type":"move","title":"移動","dur":20,"mode":"電車"}]}]},{"id":"p2","accent":"#A34B3B",...},{"id":"p3","accent":"#3D6B5A",...}]

ルール:
- type="stay"(観光・食事)またはtype="move"(移動)のみ
- moveにはmode必須("電車"/"新幹線"/"バス"/"徒歩"/"車"/"タクシー")
- durは分の整数、移動時間は実際の所要時間を基準に
- 日付: ${dayDateHint||'適切に設定'}
- JSONのみ、前後余分な文字禁止`;

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 8192 },
      }),
    }
  );
  if (!res.ok) throw new Error(`Gemini API ${res.status}`);
  const data = await res.json();
  const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '[]';
  const clean = raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
  return JSON.parse(clean);
}

// ─── App ──────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('home');
  const [selectedPlan, setSelectedPlan] = useState(null);
  const [showAI, setShowAI] = useState(false);
  const [generating, setGenerating] = useState(false);
  const [genError, setGenError] = useState('');
  const [tripState, setTripState] = useState({
    destination: '', nights: 3, people: 2,
    spots: [], startDate: '',
    hotelMode: 'booked', hotels: ['', '', ''],
  });

  const go = (target, plan) => { if (plan) setSelectedPlan(plan); setScreen(target); };

  const handleGenerate = async () => {
    if (!tripState.destination.trim()) { setGenError('行き先を入力してください'); return; }
    setGenError('');
    setGenerating(true);
    try {
      const plans = await generatePlansWithGemini(tripState);
      if (!Array.isArray(plans) || plans.length === 0) throw new Error('プランの形式が不正です');
      window.PLANS = plans;
      setSelectedPlan(plans[0]);
      setScreen('detail');
    } catch(e) {
      setGenError(`生成失敗: ${e.message}`);
    } finally {
      setGenerating(false);
    }
  };

  const renderScreen = () => {
    switch (screen) {
      case 'home':   return <HomeScreen state={tripState} setState={setTripState} onGenerate={handleGenerate} error={genError}/>;
      case 'detail': return <DetailScreen plan={selectedPlan || PLANS[0]} onPlanChange={p => setSelectedPlan(p)} onBack={() => go('home')} onShare={() => go('share')} onAIChat={() => setShowAI(true)}/>;
      case 'share':  return <ShareScreen plan={selectedPlan || PLANS[0]} onBack={() => go('detail')} onDone={() => go('detail')}/>;
      default:       return <HomeScreen state={tripState} setState={setTripState} onGenerate={handleGenerate} error={genError}/>;
    }
  };

  return (
    <div className="stage">
      {renderScreen()}
      {showAI && <AIChat onClose={() => setShowAI(false)} plan={selectedPlan || PLANS[0]} onApply={() => setShowAI(false)}/>}
      {generating && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(250,248,244,0.96)', zIndex: 200, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
          <div style={{ width: 40, height: 40, border: '3px solid #e8e4dc', borderTop: '3px solid #3B5BA5', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }}/>
          <div style={{ fontSize: 14, color: '#7a7a7a' }}>Geminiがプランを生成中...</div>
          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
